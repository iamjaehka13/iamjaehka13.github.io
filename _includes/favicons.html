{% capture favicon_path %}{{ '/assets/img/favicons' | relative_url }}{% endcapture %}
{% assign favicon_version = '?v=20260522' %}

<link rel="icon" type="image/png" href="{{ favicon_path }}/favicon-96x96.png{{ favicon_version }}" sizes="96x96">
<link rel="shortcut icon" href="{{ favicon_path }}/favicon.ico{{ favicon_version }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ favicon_path }}/apple-touch-icon.png{{ favicon_version }}">
<meta name="apple-mobile-web-app-title" content="{{ site.title }}">

{% if site.pwa.enabled %}
  <link rel="manifest" href="{{ favicon_path }}/site.webmanifest{{ favicon_version }}">
{% endif %}
